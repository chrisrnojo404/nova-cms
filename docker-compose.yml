services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: nova-cms-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql

  nginx:
    image: nginx:1.29-alpine
    container_name: nova-cms-nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: nova-cms-mysql
    environment:
      MYSQL_DATABASE: nova_cms
      MYSQL_USER: nova
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  node:
    image: node:24-alpine
    container_name: nova-cms-node
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
    depends_on:
      - app

volumes:
  mysql-data:
